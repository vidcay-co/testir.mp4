<title> Did you see  </title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    text-align: center;
    padding: 16px;
}

/* Title */
.video-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 12px;
}

/* Video Container (portrait lock) */
.video-wrapper {
    position: relative;
    width: 100%;
    max-width: 420px;       /* desktop: tidak kegedean */
    margin: 0 auto;
    aspect-ratio: 9 / 16;  /* KUNCI portrait */
    background: #000;
    border-radius: 14px;
    overflow: hidden;
}

/* Video */
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #000;
    border-radius: 14px;

    /* Disable user interaction fullscreen */
    pointer-events: auto;
}


/* Ad overlay */
.ad-overlay {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 468px;
    height: 60px;
    z-index: 10;
}
.ad-top {
    top: 10px;
}

/* Mobile optimization */
@media (max-width: 600px) {
    body {
        padding: 10px;
    }
    .video-wrapper {
        max-width: 100%;
        border-radius: 10px;
    }
}
</style>
</head>

  <script>
    // Cegah masuk fullscreen lewat JavaScript
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    });

    // Proteksi klik kanan dan F12
    (function () {
      document.addEventListener('contextmenu', function (e) {
        if (!e.target.closest('.allow-context, iframe')) {
          e.preventDefault();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === "F12") e.preventDefault();
        if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) e.preventDefault();
        if (e.ctrlKey && ["U","S"].includes(e.key.toUpperCase())) e.preventDefault();
      });
    })();
  </script>
